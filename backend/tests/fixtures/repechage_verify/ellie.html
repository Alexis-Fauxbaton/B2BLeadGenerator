  <div class="sqs-html-content" data-sqsp-text-block-content><p class="" style="white-space:pre-wrap;"><br>Ellie is an interior designer and working on high end residential projects in both London &amp; Paris.  Ellie trained as a human rights lawyer before founding her studio in 2019 with a focus on restorations of heritage buildings, often classed as monument historique in France or listed Grade I and II in the UK. </p><p class="" style="white-space:pre-wrap;">Her work is serene, layered and elegant with an emphasis on materiality and craftsmanship.  Having lived on three continents, she is an avid cross-collector and mixing furniture and art from different periods is a constant in her work. She has an eye for surprising contrasts when paring the old and the new, giving them a new perspective while setting them against a restrained and neutral palette, allowing them to breathe.  The studio only takes on a handful of projects at a time, using the highest quality materials and championing local artisans wherever possible.  </p><p class="" style="white-space:pre-wrap;">Ellie also serves as a Trustee &amp; Chair of the International Council for World Monuments France &amp; the Conseil for L'École Jeannine Manuel. She lives in Paris with her husband Edouard and their two children.</p></div>
